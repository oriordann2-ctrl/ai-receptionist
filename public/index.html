<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Receptionist</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
    }

    #chat-box {
      background: white;
      border-radius: 10px;
      padding: 15px;
      height: 400px;
      overflow-y: auto;
      border: 1px solid #ddd;
      margin-bottom: 15px;
    }

    .message {
      margin: 10px 0;
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 75%;
      clear: both;
      word-wrap: break-word;
    }

    .user {
      background: #dbeafe;
      float: right;
      text-align: right;
    }

    .bot {
      background: #e5e7eb;
      float: left;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px;
      font-size: 16px;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #111827;
      color: white;
    }

    #upload-row {
      display: none;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }

    #upload-status {
      font-size: 14px;
      color: #374151;
    }

    .clear {
      clear: both;
    }
  </style>
</head>
<body>

<h1>AI Receptionist Demo</h1>

<div id="chat-box"></div>

<div class="row">
  <input id="message-input" type="text" placeholder="Type your message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<div id="upload-row">
  <input id="file-input" type="file" style="display:none;" />
  <button id="upload-button">Choose Document</button>
  <span id="upload-status"></span>
</div>

<script>

let userId = localStorage.getItem("userId");
if (!userId) {
  userId = "user-" + Math.random().toString(36).slice(2, 10);
  localStorage.setItem("userId", userId);
}

let conversationId = sessionStorage.getItem("conversationId");
if (!conversationId) {
  conversationId = "conv-" + Date.now();
  sessionStorage.setItem("conversationId", conversationId);
}

const chatBox = document.getElementById("chat-box");
const messageInput = document.getElementById("message-input");
const fileInput = document.getElementById("file-input");
const uploadButton = document.getElementById("upload-button");
const uploadRow = document.getElementById("upload-row");
const uploadStatus = document.getElementById("upload-status");

function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.className = `message ${sender}`;

  const urlRegex = /(https?:\/\/[^\s]+)/g;
  msg.innerHTML = text.replace(urlRegex, '<a href="$1" target="_blank">$1</a>');

  chatBox.appendChild(msg);

  const clearDiv = document.createElement("div");
  clearDiv.className = "clear";
  chatBox.appendChild(clearDiv);

  chatBox.scrollTop = chatBox.scrollHeight;
}

function showUploadControls() {
  uploadRow.style.display = "flex";
}

function hideUploadControls() {
  uploadRow.style.display = "none";
  uploadStatus.textContent = "";
}

uploadButton.onclick = () => fileInput.click();

fileInput.onchange = async () => {
  const file = fileInput.files[0];
  if (!file) return;

  uploadStatus.textContent = `Uploading ${file.name}...`;

  const formData = new FormData();
  formData.append("file", file);
  formData.append("userId", userId);
  formData.append("conversationId", conversationId);

  const res = await fetch("/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  addMessage(data.message || "Uploaded successfully", "bot");
  hideUploadControls();
};

async function sendMessage() {
  const message = messageInput.value.trim();
  if (!message) return;

  addMessage(message, "user");
  messageInput.value = "";

  const response = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      userId,
      conversationId,
      message
    })
  });

  const data = await response.json();
  const reply = data.reply || "Error";

  addMessage(reply, "bot");

  // 🔥 Voice plays ONLY for replies (not intro)
  playMaeveVoice(reply);

  const replyLower = reply.toLowerCase();

  if (replyLower.includes("upload")) {
    showUploadControls();
  } else {
    hideUploadControls();
  }
}

async function playMaeveVoice(text) {
  const response = await fetch("/voice?t=" + Date.now(), {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ text })
  });

  const blob = await response.blob();
  const audio = new Audio(URL.createObjectURL(blob));
  audio.play();
}

// ✅ SINGLE GDPR INTRO (TEXT + VOICE)

const introText =
  "Hi there 👋 I’m Maeve.\n\nI can help you get started with a mortgage or answer any questions.\n\nBefore we begin — I’ll ask a few questions and may collect personal information to help with your enquiry. This information will only be used for that purpose.\n\nIs that okay?";

addMessage(introText, "bot");

playMaeveVoice(
  "Hi there, I’m Maeve. I can help you get started with a mortgage or answer any questions. Before we begin, I’ll ask a few questions and may collect personal information to help with your enquiry. This information will only be used for that purpose. Is that okay?"
);

messageInput.addEventListener("keypress", function (e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});

</script>

</body>
</html>
