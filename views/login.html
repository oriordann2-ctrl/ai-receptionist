<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <title>Sprimal — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
    }

    /* ── Left brand panel ───────────────────────────────────── */
    .brand-panel {
      flex: 1;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 64px 56px;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .brand-panel::before {
      content: '';
      position: absolute;
      top: -120px;
      right: -120px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .brand-panel::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .brand-logo-text {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: white;
    }

    .brand-tagline {
      font-size: 17px;
      color: #94a3b8;
      line-height: 1.65;
      max-width: 380px;
      margin-bottom: 52px;
    }

    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .feature-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .feature-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3b82f6;
      margin-top: 7px;
      flex-shrink: 0;
    }

    .feature-item span {
      font-size: 15px;
      color: #cbd5e1;
      line-height: 1.5;
    }

    /* ── Right form panel ───────────────────────────────────── */
    .form-panel {
      width: 460px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      background: #f8fafc;
    }

    .login-card {
      width: 100%;
      max-width: 360px;
    }

    .login-card h1 {
      font-size: 26px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.4px;
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 15px;
      color: #64748b;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #475569;
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .form-group input {
      width: 100%;
      padding: 13px 15px;
      font-size: 15px;
      font-family: inherit;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      background: white;
      color: #0f172a;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      border: none;
      border-radius: 10px;
      background: #1e40af;
      color: white;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(30,64,175,0.25);
    }

    .btn-login:hover {
      background: #1d3a9e;
      box-shadow: 0 4px 14px rgba(30,64,175,0.3);
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .error-msg {
      color: #dc2626;
      font-size: 13px;
      margin-top: 14px;
      min-height: 18px;
      font-weight: 500;
    }

    /* ── Mobile ─────────────────────────────────────────────── */
    @media (max-width: 800px) {
      .brand-panel { display: none; }
      .form-panel {
        width: 100%;
        min-height: 100vh;
        background: white;
        padding: 48px 28px;
        align-items: flex-start;
        padding-top: 80px;
      }
      body { background: white; }
    }
  </style>
</head>
<body>

  <div class="brand-panel">
    <div class="brand-logo">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="11" fill="#4f76f6"/>
        <line x1="24" y1="11" x2="38.5" y2="36" stroke="white" stroke-width="3" stroke-linecap="round"/>
        <line x1="38.5" y1="36" x2="9.5" y2="36" stroke="white" stroke-width="3" stroke-linecap="round"/>
        <line x1="9.5" y1="36" x2="24" y2="11" stroke="white" stroke-width="3" stroke-linecap="round"/>
        <circle cx="24" cy="11" r="4.5" fill="white"/>
        <circle cx="38.5" cy="36" r="4.5" fill="white"/>
        <circle cx="9.5" cy="36" r="4.5" fill="white"/>
      </svg>
      <span class="brand-logo-text">Sprimal</span>
    </div>
    <p class="brand-tagline">
      AI-powered knowledge for your mortgage brokerage team.
    </p>
    <div class="feature-list">
      <div class="feature-item">
        <div class="feature-dot"></div>
        <span>Instant answers from your lender documents</span>
      </div>
      <div class="feature-item">
        <div class="feature-dot"></div>
        <span>Broker-approved knowledge base your team can trust</span>
      </div>
      <div class="feature-item">
        <div class="feature-dot"></div>
        <span>Consistent answers across your whole team</span>
      </div>
    </div>
  </div>

  <div class="form-panel">
    <div class="login-card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;">
        <svg width="36" height="36" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="11" fill="#4f76f6"/>
          <line x1="24" y1="11" x2="38.5" y2="36" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <line x1="38.5" y1="36" x2="9.5" y2="36" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <line x1="9.5" y1="36" x2="24" y2="11" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <circle cx="24" cy="11" r="4.5" fill="white"/>
          <circle cx="38.5" cy="36" r="4.5" fill="white"/>
          <circle cx="9.5" cy="36" r="4.5" fill="white"/>
        </svg>
        <span style="font-size:22px;font-weight:800;color:#0f1d40;letter-spacing:-0.3px;">Sprimal</span>
      </div>
      <h1>Welcome back</h1>
      <p class="login-subtitle">Enter your password to access the dashboard.</p>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          placeholder="Enter your password"
          autofocus
        />
      </div>

      <button class="btn-login" onclick="login()">Sign in →</button>

      <div id="error" class="error-msg"></div>
    </div>
  </div>

  <script>
    async function login() {
      const password = document.getElementById("password").value;
      const errorDiv = document.getElementById("error");

      errorDiv.textContent = "";

      if (!password) {
        errorDiv.textContent = "Please enter a password.";
        return;
      }

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password })
        });

        const data = await res.json();

        if (data.success) {
          window.location.href = "/admin";
        } else {
          errorDiv.textContent = data.error || "Invalid password.";
        }
      } catch (err) {
        errorDiv.textContent = "Something went wrong. Try again.";
      }
    }

    document.getElementById("password").addEventListener("keypress", function (e) {
      if (e.key === "Enter") login();
    });
  </script>

</body>
</html>
