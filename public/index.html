<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Receptionist</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    #chat-box {
      background: white;
      border-radius: 10px;
      padding: 15px;
      height: 400px;
      overflow-y: auto;
      border: 1px solid #ddd;
      margin-bottom: 15px;
    }

    .message {
      margin: 10px 0;
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 75%;
      clear: both;
    }

    .user {
      background: #dbeafe;
      float: right;
      text-align: right;
    }

    .bot {
      background: #e5e7eb;
      float: left;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
    }

    .clear {
      clear: both;
    }
  </style>
</head>
<body>
  <h1>AI Receptionist Demo</h1>
  <div id="chat-box"></div>

  <div class="row">
    <input id="message-input" type="text" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    const userId = "demo-user";
    const chatBox = document.getElementById("chat-box");
    const messageInput = document.getElementById("message-input");

    function addMessage(text, sender) {
      const msg = document.createElement("div");
      msg.className = `message ${sender}`;
      msg.innerText = text;
      chatBox.appendChild(msg);

      const clearDiv = document.createElement("div");
      clearDiv.className = "clear";
      chatBox.appendChild(clearDiv);

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;

      addMessage(message, "user");
      messageInput.value = "";

      const response = await fetch("/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          userId,
          message
        })
      });

      const data = await response.json();
      addMessage(data.reply, "bot");
    }

    messageInput.addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });

    addMessage("Hello — I can help you book an appointment. Type 'book appointment' to begin.", "bot");
  </script>
</body>
</html>
