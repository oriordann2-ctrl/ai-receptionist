<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TENANT_NAME_PLACEHOLDER — Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111827;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      background: #111827;
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      padding-top: max(14px, env(safe-area-inset-top));
    }
    #avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: #374151;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    #avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    #header-info { flex: 1; min-width: 0; }
    #header-name { font-size: 15px; font-weight: 700; color: white; }
    #header-sub  { font-size: 12px; color: #9ca3af; margin-top: 1px; }
    #header-dot  {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; flex-shrink: 0;
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      background: #f9fafb;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.45;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .bot  { background: #e5e7eb; color: #111827; align-self: flex-start; border-bottom-left-radius: 4px; }
    .user { background: #111827; color: white;   align-self: flex-end;   border-bottom-right-radius: 4px; }

    .typing {
      display: flex; gap: 5px; padding: 12px 14px;
      align-items: center; align-self: flex-start;
      background: #e5e7eb; border-radius: 18px; border-bottom-left-radius: 4px;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #9ca3af; animation: bounce 0.9s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    /* ── Input bar ── */
    #footer {
      background: white;
      border-top: 1px solid #e5e7eb;
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      transition: border-color 0.15s;
    }
    #input:focus { border-color: #111827; }
    #send-btn {
      width: 42px; height: 42px; flex-shrink: 0;
      background: #111827; border: none; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; padding: 0;
    }
    #send-btn:hover  { background: #1f2937; }
    #send-btn:active { background: #374151; }
    #send-btn:disabled { background: #d1d5db; cursor: not-allowed; }
    #send-btn svg { width: 20px; height: 20px; fill: white; }
  </style>
</head>
<body>

<div id="header">
  <div id="avatar">AVATAR_PLACEHOLDER</div>
  <div id="header-info">
    <div id="header-name">Maeve</div>
    <div id="header-sub">TENANT_NAME_PLACEHOLDER</div>
  </div>
  <div id="header-dot"></div>
</div>

<div id="messages"></div>

<div id="footer">
  <textarea id="input" rows="1" placeholder="Ask a question…"></textarea>
  <button id="send-btn" aria-label="Send">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  var TENANT_ID   = "TENANT_ID_PLACEHOLDER";
  var TENANT_NAME = "TENANT_NAME_PLACEHOLDER";
  var BACKEND     = "https://app.sprimal.com";

  var userId         = "qr-" + Math.random().toString(36).slice(2, 10);
  var conversationId = sessionStorage.getItem("sprimal_qr_conv_" + TENANT_ID);
  if (!conversationId) {
    conversationId = "qr-conv-" + Date.now();
    sessionStorage.setItem("sprimal_qr_conv_" + TENANT_ID, conversationId);
  }

  var messagesEl = document.getElementById("messages");
  var inputEl    = document.getElementById("input");
  var sendBtn    = document.getElementById("send-btn");
  var hasOpened  = false;

  function addMsg(text, role) {
    var div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    var el = document.createElement("div");
    el.className = "typing"; el.id = "typing";
    el.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    var el = document.getElementById("typing");
    if (el) el.remove();
  }

  function autoResize() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  }

  function send() {
    var text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    addMsg(text, "user");
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;
    showTyping();

    fetch(BACKEND + "/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ userId: userId, conversationId: conversationId, message: text, clubId: TENANT_ID })
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        hideTyping();
        addMsg(data.reply || "Sorry, something went wrong.", "bot");
        sendBtn.disabled = false;
        inputEl.focus();
      })
      .catch(function() {
        hideTyping();
        addMsg("Sorry, I couldn't connect. Please try again.", "bot");
        sendBtn.disabled = false;
      });
  }

  sendBtn.addEventListener("click", send);

  inputEl.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  inputEl.addEventListener("input", autoResize);

  // Greeting on load
  window.addEventListener("load", function() {
    var greeting = "Hi there 👋 I'm Maeve, the " + TENANT_NAME + " assistant.\n\nWhat would you like to know?";
    addMsg(greeting, "bot");
    inputEl.focus();
  });
</script>
</body>
</html>
